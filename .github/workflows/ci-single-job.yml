name: CI single job

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compile
        run: mvn -B -q compile

      - name: Unit tests
        run: mvn -B -q test

      - name: Package
        run: mvn -B -q package

      - name: Integration tests
        run: mvn -B -q verify -DskipTests=false

      - name: Javadoc
        run: mvn -B -q javadoc:javadoc

