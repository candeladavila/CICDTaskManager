name: Build (all stages)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compile
        run: mvn compile

      - name: Run unit tests
        run: mvn test

      - name: Package
        run: mvn package

      - name: Run integration tests
        run: mvn integration-test

      - name: Generate coverage report (opt-in)
        run: mvn test -P coverage

      - name: Generate Javadoc
        run: mvn javadoc:javadoc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: target-jar
          path: target/*.jar

